spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ai_chat}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

groq:
  api:
    key: ${GROQ_API_KEY:}
    url: https://api.groq.com/openai/v1
    model: llama-3.1-8b-instant

auth:
  service:
    url: ${AUTH_SERVICE_URL:http://localhost:8080}

server:
  port: ${SERVER_PORT:8081}

jwt:
  secret: ${JWT_SECRET:my_super_secret_key_for_jwt_authentication_system_2026}

feign:
  client:
    config:
      default:
        connectTimeout: 30000
        readTimeout: 60000
        loggerLevel: basic

logging:
  level:
    com.ranger.aichat: DEBUG
    com.ranger.aichat.client: DEBUG
    com.ranger.aichat.service: DEBUG
    feign: DEBUG